  <path d="M276 646h472" fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-width="24" />
  <text x="512" y="574" fill="url(#gold)" font-family="Helvetica, Arial, sans-serif" font-size="250" font-weight="800" letter-spacing="-18" text-anchor="middle">33</text>
  <text x="512" y="755" fill="#f1dfbd" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="18" text-anchor="middle">ESSEX</text>
  <path d="M324 812h376" fill="none" stroke="#d4aa64" stroke-opacity="0.72" stroke-width="4" />
  <text x="512" y="870" fill="#ba9455" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="600" letter-spacing="9" text-anchor="middle">BULWER · BEREA</text>
