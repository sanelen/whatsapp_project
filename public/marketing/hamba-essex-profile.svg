<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Hamba Essex profile image</title>
  <desc id="desc">Gold Hamba Essex property mark on a textured black background.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1815" />
      <stop offset="0.55" stop-color="#090909" />
      <stop offset="1" stop-color="#15110c" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4dda8" />
      <stop offset="0.48" stop-color="#d4aa64" />
      <stop offset="1" stop-color="#96682f" />
    </linearGradient>
    <pattern id="texture" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(42)">
      <line x1="0" y1="0" x2="0" y2="34" stroke="#f3d89d" stroke-opacity="0.045" stroke-width="2" />
    </pattern>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#background)" />
