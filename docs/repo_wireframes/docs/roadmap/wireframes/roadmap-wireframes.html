document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 style=\"font-size:8.5px;border:1.2px solid #2f7d72;border-radius:999px;padding:1px 6px\">new<\u002Fspan><\u002Fdiv>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9.5px;color:#3a382f;line-height:1.6;margin-top:5px\">• id · ◆ property_id · ◆ unit_id?<br>kind · storage_path · public_url<br>caption · sort_order · w/h/bytes<\u002Fdiv>\n      <div style=\"font-size:10px;color:#8a857a;margin-top:5px\">Room photos / gallery (cover = sort_order 0).<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border:1.6px dashed #3a6ea5;border-radius:9px;padding:11px;background:#f1f5fa;margin-bottom:10px\">\n      <div style=\"font-family:ui-monospace,monospace;font-size:11.5px;font-weight:700;color:#2a5586\">conversations <span style=\"font-size:8.5px;border:1.2px solid #3a6ea5;border-radius:999px;padding:1px 6px\">+ columns<\u002Fspan><\u002Fdiv>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9.5px;color:#3a382f;line-height:1.6;margin-top:5px\">bot_paused · state/intent<br>assigned_agent · summary<\u002Fdiv>\n      <div style=\"font-size:10px;color:#8a857a;margin-top:5px\">Human-takeover + intent routing (assistant wireframes ②).<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border:1.6px dashed #3a6ea5;border-radius:9px;padding:11px;background:#f1f5fa;margin-bottom:10px\">\n      <div style=\"font-family:ui-monospace,monospace;font-size:11.5px;font-weight:700;color:#2a5586\">leads <span style=\"font-size:8.5px;border:1.2px solid #3a6ea5;border-radius:999px;padding:1px 6px\">new<\u002Fspan><\u002Fdiv>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9.5px;color:#3a382f;line-height:1.6;margin-top:5px\">• id · ◆ conversation_id<br>◆ property_id? · unit_id?<br>contacts[] · occupants · status · summary<\u002Fdiv>\n      <div style=\"font-size:10px;color:#8a857a;margin-top:5px\">Inquiry capture / follow-up (assistant \"interested\" flow).<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border:1.6px dashed #a85a4a;border-radius:9px;padding:11px;background:#fbf3f0\">\n      <div style=\"font-family:ui-monospace,monospace;font-size:11.5px;font-weight:700;color:#86402f\">tenant_offboardings <span style=\"font-size:8.5px;border:1.2px solid #a85a4a;border-radius:999px;padding:1px 6px\">new<\u002Fspan><\u002Fdiv>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9.5px;color:#3a382f;line-height:1.6;margin-top:5px\">• id · ◆ unit_id<br>notice_date · last_day · reason<br>reason_is_performance · survey_response<br>inspection_status · deposit_amount<br>banking_proof · banking_details · status<\u002Fdiv>\n      <div style=\"font-size:10px;color:#8a857a;margin-top:5px\">The \"leaving\" process (offboarding wireframes ③).<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ SECTION 8 : WIREFRAME DESIGN REVIEW ============ -->\n<div style=\"position:absolute;left:60px;top:8160px;font-family:Caveat,cursive;font-size:38px;font-weight:700;color:#2b2b2b\">⑧ Design Review <span style=\"font-size:22px;color:#8a857a\">· wireframes ↔ live schema<\u002Fspan><\u002Fdiv>\n<div style=\"position:absolute;left:60px;top:8212px;font-family:Atkinson Hyperlegible,sans-serif;font-size:12.5px;color:#8a857a;max-width:1000px;line-height:1.4\">Reconciling the wireframes (sections ①–⑥) with what's actually in the database now. ✅ = matches / already built · ⚠ = needs a change or a migration.<\u002Fdiv>\n\n<!-- review column 1 : matches -->\n<div style=\"position:absolute;left:60px;top:8290px;width:560px\">\n  <div data-drags-parent=\"1\" style=\"position:absolute;top:-26px;left:4px;font-family:Caveat,cursive;font-size:20px;font-weight:700;color:#6b6760\">✅ What's already true<\u002Fdiv>\n  <div style=\"background:#fff;border:1.6px solid #2b2b2b;border-radius:12px;box-shadow:0 3px 0 rgba(43,43,43,.16),0 10px 24px rgba(0,0,0,.05);box-sizing:border-box;padding:18px;height:540px\">\n    <div style=\"border-left:4px solid #4f7a4f;background:#f0f5ee;border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:11px\">\n      <div style=\"font-size:12.5px;font-weight:700;color:#2f5a2c\">Payments tables already shipped<\u002Fdiv>\n      <div style=\"font-size:11px;color:#3a382f;margin-top:3px;line-height:1.45\"><span style=\"font-family:ui-monospace,monospace\">property_units · unit_payment_periods · payment_references<\u002Fspan> all exist (migration 2026-06-29). The payments dashboard (①) can be built read-path today.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-left:4px solid #4f7a4f;background:#f0f5ee;border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:11px\">\n      <div style=\"font-size:12.5px;font-weight:700;color:#2f5a2c\">Reference rules ≈ match hints<\u002Fdiv>\n      <div style=\"font-size:11px;color:#3a382f;margin-top:3px;line-height:1.45\">The ⑥ \"reference rules\" screen maps cleanly to <span style=\"font-family:ui-monospace,monospace\">bank_import_unit_match_hints<\u002Fspan> — matcher types <span style=\"font-family:ui-monospace,monospace\">reference_contains / _equals / _regex / payer_name_contains / amount_equals<\u002Fspan> already cover \"starts-with\", \"amount =\" and the phone fallback.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-left:4px solid #4f7a4f;background:#f0f5ee;border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:11px\">\n      <div style=\"font-size:12.5px;font-weight:700;color:#2f5a2c\">Mismatch + block states are real<\u002Fdiv>\n      <div style=\"font-size:11px;color:#3a382f;margin-top:3px;line-height:1.45\"><span style=\"font-family:ui-monospace,monospace\">unit_payment_periods.status<\u002Fspan> includes <span style=\"font-family:ui-monospace,monospace\">'mismatch'<\u002Fspan> and <span style=\"font-family:ui-monospace,monospace\">'blocked'<\u002Fspan>; <span style=\"font-family:ui-monospace,monospace\">is_blocked<\u002Fspan> exists on both unit + period. The table's flagged rows (①) are backed.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-left:4px solid #4f7a4f;background:#f0f5ee;border-radius:0 8px 8px 0;padding:11px 13px\">\n      <div style=\"font-size:12.5px;font-weight:700;color:#2f5a2c\">Sign-off + audit fields exist<\u002Fdiv>\n      <div style=\"font-size:11px;color:#3a382f;margin-top:3px;line-height:1.45\"><span style=\"font-family:ui-monospace,monospace\">signed_off · signed_off_at · signed_off_by<\u002Fspan> on payment_references back the sign-off / reverse / audit flows (drawer in ①).<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- review column 2 : needs change -->\n<div style=\"position:absolute;left:660px;top:8290px;width:600px\">\n  <div data-drags-parent=\"1\" style=\"position:absolute;top:-26px;left:4px;font-family:Caveat,cursive;font-size:20px;font-weight:700;color:#6b6760\">⚠ Needs a change / migration<\u002Fdiv>\n  <div style=\"background:#fff;border:1.6px solid #2b2b2b;border-radius:12px;box-shadow:0 3px 0 rgba(43,43,43,.16),0 10px 24px rgba(0,0,0,.05);box-sizing:border-box;padding:18px;height:540px\">\n    <div style=\"border-left:4px solid #b98a1e;background:#fbf6e8;border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:10px\">\n      <div style=\"font-size:12.5px;font-weight:700;color:#8a6612\">Rooms form invents fields<\u002Fdiv>\n      <div style=\"font-size:11px;color:#3a382f;margin-top:3px;line-height:1.45\">The ⑥ Create/edit room form shows deposit, max occupants, parking, ensuite, features, photos, \"available\" — <b>none exist<\u002Fb> on <span style=\"font-family:ui-monospace,monospace\">property_units<\u002Fspan> yet. They're the property-details roadmap → needs the <b>+columns<\u002Fb> migration + <span style=\"font-family:ui-monospace,monospace\">property_media<\u002Fspan> (see ⑦).<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-left:4px solid #b98a1e;background:#fbf6e8;border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:10px\">\n      <div style=\"font-size:12.5px;font-weight:700;color:#8a6612\">\"On market\" ≠ a real state<\u002Fdiv>\n      <div style=\"font-size:11px;color:#3a382f;margin-top:3px;line-height:1.45\"><span style=\"font-family:ui-monospace,monospace\">occupancy_status<\u002Fspan> is only <span style=\"font-family:ui-monospace,monospace\">occupied | vacant<\u002Fspan>. The wireframes' \"on market\" badge needs the new <span style=\"font-family:ui-monospace,monospace\">is_available<\u002Fspan> flag, not a new occupancy value.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-left:4px solid #b98a1e;background:#fbf6e8;border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:10px\">\n      <div style=\"font-size:12.5px;font-weight:700;color:#8a6612\">References arrive by bank email, not typing<\u002Fdiv>\n      <div style=\"font-size:11px;color:#3a382f;margin-top:3px;line-height:1.45\">A full Gmail→PDF→parsed-entries pipeline already feeds the pool (<span style=\"font-family:ui-monospace,monospace\">bank_import_*<\u002Fspan>). The ① reference-pool wireframe should show an <b>import source + auto-suggested matches<\u002Fb>, not a manual \"add reference\" affordance.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-left:4px solid #b98a1e;background:#fbf6e8;border-radius:0 8px 8px 0;padding:11px 13px\">\n      <div style=\"font-size:12.5px;font-weight:700;color:#8a6612\">Field-name drift<\u002Fdiv>\n      <div style=\"font-size:11px;color:#3a382f;margin-top:3px;line-height:1.45\">Use real names: <span style=\"font-family:ui-monospace,monospace\">period_start<\u002Fspan> (not \"period\"), <span style=\"font-family:ui-monospace,monospace\">note<\u002Fspan> (not \"notes\"), <span style=\"font-family:ui-monospace,monospace\">contact_primary/secondary<\u002Fspan> (not contacts[]). The ④ data-map + ⑤ links should be updated to match.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- review column 3 : recommended next -->\n<div style=\"position:absolute;left:1300px;top:8290px;width:440px\">\n  <div data-drags-parent=\"1\" style=\"position:absolute;top:-26px;left:4px;font-family:Caveat,cursive;font-size:20px;font-weight:700;color:#6b6760\">→ Recommended next steps<\u002Fdiv>\n  <div style=\"background:#2b2b2b;color:#fff;border-radius:12px;box-shadow:0 3px 0 rgba(43,43,43,.16),0 10px 24px rgba(0,0,0,.05);box-sizing:border-box;padding:18px;height:540px\">\n    <div style=\"display:flex;gap:10px;margin-bottom:13px\"><div style=\"font-family:Caveat,cursive;font-size:24px;font-weight:700;color:#cfd8c8;line-height:1\">1<\u002Fdiv><div style=\"font-size:12px;line-height:1.45;color:#e8e6df\">Build the payments dashboard read-path on the <b>existing<\u002Fb> tables — no migration needed to start (①).<\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:10px;margin-bottom:13px\"><div style=\"font-family:Caveat,cursive;font-size:24px;font-weight:700;color:#cfd8c8;line-height:1\">2<\u002Fdiv><div style=\"font-size:12px;line-height:1.45;color:#e8e6df\">Point the Rooms \"reference rules\" UI (⑥) at <span style=\"font-family:ui-monospace,monospace;font-size:11px\">bank_import_unit_match_hints<\u002Fspan> + <span style=\"font-family:ui-monospace,monospace;font-size:11px\">expected_reference<\u002Fspan>.<\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:10px;margin-bottom:13px\"><div style=\"font-family:Caveat,cursive;font-size:24px;font-weight:700;color:#cfd8c8;line-height:1\">3<\u002Fdiv><div style=\"font-size:12px;line-height:1.45;color:#e8e6df\">One additive migration to add the property-details columns + <span style=\"font-family:ui-monospace,monospace;font-size:11px\">property_media<\u002Fspan> before the Rooms editor (⑥, ⑦).<\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:10px;margin-bottom:13px\"><div style=\"font-family:Caveat,cursive;font-size:24px;font-weight:700;color:#cfd8c8;line-height:1\">4<\u002Fdiv><div style=\"font-size:12px;line-height:1.45;color:#e8e6df\">Redraw the reference pool (①) around the bank-import pipeline; show suggested matches + a human sign-off gate.<\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:10px\"><div style=\"font-family:Caveat,cursive;font-size:24px;font-weight:700;color:#cfd8c8;line-height:1\">5<\u002Fdiv><div style=\"font-size:12px;line-height:1.45;color:#e8e6df\">Defer <span style=\"font-family:ui-monospace,monospace;font-size:11px\">leads<\u002Fspan> + <span style=\"font-family:ui-monospace,monospace;font-size:11px\">tenant_offboardings<\u002Fspan> migrations to their feature phases (②, ③).<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
